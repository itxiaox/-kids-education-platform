<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📜 播放历史 - 伴我学</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .history-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        .history-header {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-header h1 {
            margin: 0;
            color: #333;
            font-size: 24px;
        }
        .back-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }
        .history-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .history-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card .num {
            font-size: 32px;
            font-weight: bold;
        }
        .stat-card .label {
            font-size: 14px;
            opacity: 0.9;
        }
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .history-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #eee;
            transition: background 0.3s;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .history-item:hover {
            background: #f8f9fa;
        }
        .history-thumb {
            width: 120px;
            height: 68px;
            background: #e9ecef;
            border-radius: 8px;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
        }
        .history-info {
            flex: 1;
        }
        .history-info h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #333;
        }
        .history-meta {
            font-size: 13px;
            color: #666;
        }
        .history-time {
            font-size: 13px;
            color: #999;
            margin-left: 16px;
        }
        .clear-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .clear-btn:hover {
            background: #c82333;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
        }
        .delete-btn:hover {
            color: #c82333;
        }
        
        /* 播放历史页面响应式设计 */
        @media (max-width: 768px) {
            .history-container {
                margin: 20px auto;
                padding: 12px;
            }
            
            .history-header {
                flex-direction: column;
                gap: 12px;
                padding: 16px;
            }
            
            .history-header h1 {
                font-size: 20px;
            }
            
            .back-btn,
            .clear-btn {
                padding: 10px 16px;
                font-size: 13px;
            }
            
            .history-content {
                padding: 16px;
            }
            
            .history-stats {
                flex-direction: column;
                gap: 12px;
            }
            
            .stat-card {
                padding: 16px;
            }
            
            .stat-card .num {
                font-size: 26px;
            }
            
            .history-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
                padding: 12px;
            }
            
            .history-thumb {
                width: 100%;
                height: 56px;
                margin-right: 0;
                font-size: 28px;
            }
            
            .history-info {
                width: 100%;
            }
            
            .history-info h3 {
                font-size: 15px;
            }
            
            .history-time {
                margin-left: 0;
                align-self: flex-end;
            }
            
            .delete-btn {
                align-self: flex-end;
            }
            
            .empty-state {
                padding: 40px 15px;
            }
            
            .empty-state .icon {
                font-size: 52px;
            }
        }
        
        @media (max-width: 480px) {
            .history-container {
                margin: 15px auto;
                padding: 10px;
            }
            
            .history-header h1 {
                font-size: 18px;
            }
            
            .stat-card .num {
                font-size: 22px;
            }
            
            .stat-card .label {
                font-size: 13px;
            }
            
            .history-item {
                padding: 10px;
            }
            
            .history-thumb {
                height: 50px;
                font-size: 24px;
            }
        }
        
        @media (min-width: 1920px) {
            .history-container {
                max-width: 1200px;
                margin: 60px auto;
                padding: 30px;
            }
            
            .history-header {
                padding: 30px;
            }
            
            .history-header h1 {
                font-size: 28px;
            }
            
            .history-content {
                padding: 30px;
            }
            
            .stat-card {
                padding: 24px;
            }
            
            .stat-card .num {
                font-size: 36px;
            }
            
            .history-item {
                padding: 20px;
            }
            
            .history-thumb {
                width: 140px;
                height: 80px;
                font-size: 38px;
            }
            
            .history-info h3 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="history-container">
        <div class="history-header">
            <h1>📜 播放历史</h1>
            <div>
                <button class="clear-btn" onclick="clearHistory()">🗑️ 清空历史</button>
                <button class="back-btn" onclick="goBack()">← 返回首页</button>
            </div>
        </div>

        <div class="history-content">
            <div class="history-stats" id="historyStats">
                <div class="stat-card">
                    <div class="num" id="totalCount">0</div>
                    <div class="label">观看视频数</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                    <div class="num" id="totalTime">0分钟</div>
                    <div class="label">累计观看</div>
                </div>
            </div>

            <ul class="history-list" id="historyList">
                <li class="empty-state" id="emptyState">
                    <div class="icon">📭</div>
                    <p>暂无播放历史</p>
                    <p style="font-size: 14px; color: #999;">快去观看感兴趣的视频吧！</p>
                </li>
            </ul>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let historyData = [];

        function loadHistory() {
            fetch(`${API_BASE}/api/history`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0 && data.data && data.data.history && data.data.history.length > 0) {
                        historyData = data.data.history;
                        renderHistory(data.data.history);
                        updateStats(data.data.history);
                    } else {
                        showEmpty();
                    }
                })
                .catch(err => {
                    console.error('加载历史失败:', err);
                    showEmpty();
                });
        }

        function renderHistory(items) {
            const list = document.getElementById('historyList');
            const empty = document.getElementById('emptyState');

            if (!items || items.length === 0) {
                showEmpty();
                return;
            }

            empty.style.display = 'none';
            list.innerHTML = items.map((item, index) => {
                const thumb = getCategoryEmoji(item.category);
                const time = item.timestamp ? new Date(item.timestamp).toLocaleString('zh-CN') : '';
                return `
                    <li class="history-item">
                        <div class="history-thumb" onclick="playVideo('${item.video_path}')">${thumb}</div>
                        <div class="history-info">
                            <h3>${item.video_name}</h3>
                            <div class="history-meta">📂 ${getCategoryName(item.category)}</div>
                        </div>
                        <span class="history-time">${time}</span>
                        <button class="delete-btn" onclick="deleteItem(${index})">✕</button>
                    </li>
                `;
            }).join('');
        }

        function updateStats(items) {
            document.getElementById('totalCount').textContent = items.length;
            document.getElementById('totalTime').textContent = items.length * 5 + '分钟';
        }

        function showEmpty() {
            document.getElementById('historyList').innerHTML = `
                <li class="empty-state" id="emptyState">
                    <div class="icon">📭</div>
                    <p>暂无播放历史</p>
                    <p style="font-size: 14px; color: #999;">快去观看感兴趣的视频吧！</p>
                </li>
            `;
            document.getElementById('totalCount').textContent = '0';
            document.getElementById('totalTime').textContent = '0分钟';
        }

        function getCategoryEmoji(category) {
            const map = {
                'math': '📐',
                'english': '🔤',
                'pinyin': '🅰️',
                'science': '🔬'
            };
            return map[category] || '📺';
        }

        function getCategoryName(category) {
            const map = {
                'math': '数学',
                'english': '英语',
                'pinyin': '拼音',
                'science': '科学'
            };
            return map[category] || '未分类';
        }

        function playVideo(key) {
            sessionStorage.setItem('playVideoKey', key);
            window.location.href = '/';
        }

        function goBack() {
            window.location.href = '/';
        }

        function deleteItem(index) {
            if (!historyData[index]) return;
            const key = historyData[index].video_key;

            fetch(`${API_BASE}/api/history/${encodeURIComponent(key)}`, {
                method: 'DELETE'
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    historyData.splice(index, 1);
                    if (historyData.length > 0) {
                        renderHistory(historyData);
                        updateStats(historyData);
                    } else {
                        showEmpty();
                    }
                }
            })
            .catch(err => console.error('删除失败:', err));
        }

        function clearHistory() {
            if (!confirm('确定要清空所有播放历史吗？')) return;

            fetch(`${API_BASE}/api/history/clear`, {
                method: 'POST'
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    showEmpty();
                }
            })
            .catch(err => console.error('清空失败:', err));
        }

        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
